# pytest.ini

[pytest]

# ============================================================
# HHS Runtime Pytest Topology Configuration
# ============================================================

# Canonical repository root import surface.
#
# Prevents:
# - ModuleNotFoundError drift
# - cwd-relative import ambiguity
# - package shadowing during collection
# - inconsistent runtime bootstrap behavior
#
# This ensures pytest behaves consistently with:
# - bundle runner
# - runtime certification
# - backend startup
# - websocket runtime
#
# Invariants:
# Δe = 0
# Ψ = 0
# Θ15 = true
# Ω = true

pythonpath = .

# ------------------------------------------------------------
# Canonical test roots
# ------------------------------------------------------------

testpaths =
    tests

# ------------------------------------------------------------
# Discovery patterns
# ------------------------------------------------------------

python_files =
    test_*.py
    *_test.py

python_classes =
    Test*

python_functions =
    test_*

# ------------------------------------------------------------
# Runtime verbosity
# ------------------------------------------------------------

addopts =
    -ra
    --strict-markers
    --tb=short

# ------------------------------------------------------------
# Cache isolation
# ------------------------------------------------------------

cache_dir =
    .pytest_cache

# ------------------------------------------------------------
# Warning normalization
# ------------------------------------------------------------

filterwarnings =
    ignore::DeprecationWarning

# ------------------------------------------------------------
# Async runtime support
# ------------------------------------------------------------

asyncio_mode = auto